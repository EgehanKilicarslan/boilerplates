networks:
  frontend:
    external: true # <-- (Optional) Change this to false if you want to create a new network
  backend:
    external: true # <-- (Optional) Change this to false if you want to create a new network

volumes:
  supabase-defaults:
    external: true # <-- (Optional) Change this to false if you want to create a new volume
  supabase-db-data:
    external: true # <-- (Optional) Change this to false if you want to create a new volume
  supabase-db-config:
    external: true # <-- (Optional) Change this to false if you want to create a new volume
  supabase-storage-data:
    external: true # <-- (Optional) Change this to false if you want to create a new volume
  supabase-studio-snippets:
    external: true # <-- (Optional) Change this to false if you want to create a new volume
  supabase-studio-functions:
    external: true # <-- (Optional) Change this to false if you want to create a new volume

services:
  # --- DATABASE ---
  db:
    image: supabase/postgres:15.8.1.085
    container_name: supabase-db
    env_file: stack.env
    networks:
      - backend
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - supabase-db-config:/etc/postgresql-custom
      - supabase-defaults:/docker-defaults:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    entrypoint: >
      sh -c "
      cp /docker-defaults/db/roles.sql /docker-entrypoint-initdb.d/init-scripts/99-roles.sql &&
      cp /docker-defaults/db/jwt.sql /docker-entrypoint-initdb.d/init-scripts/99-jwt.sql &&
      exec /docker-entrypoint.sh postgres
      "
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
    depends_on:
      vector: { condition: service_healthy }

  # --- LOGGING PIPELINE (Vector) ---
  vector:
    image: timberio/vector:0.53.0-alpine
    container_name: supabase-vector
    env_file: stack.env
    networks:
      - backend
    volumes:
      - supabase-defaults:/etc/vector-defaults:ro
      - ${DOCKER_SOCKET_LOCATION}:/var/run/docker.sock:ro,z
    command: ["--config", "/etc/vector-defaults/logs/vector.yml"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9001/health"]
      interval: 5s

  # --- API GATEWAY (Kong) ---
  kong:
    image: kong:2.8.1
    container_name: supabase-kong
    env_file: stack.env
    networks:
      - frontend
      - backend
    ports:
      - "8000:8000"
    volumes:
      - supabase-defaults:/docker-defaults:ro
    entrypoint: >
      bash -c 'eval "echo \"$$(cat /docker-defaults/api/kong.yml)\"" > ~/kong.yml && 
      /docker-entrypoint.sh kong docker-start'
    depends_on:
      analytics: { condition: service_healthy }

  # --- ANALYTICS (Logflare) ---
  analytics:
    image: supabase/logflare:1.31.2
    container_name: supabase-analytics
    env_file: stack.env
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "http://localhost:4000/health"]
      interval: 5s
    depends_on:
      db: { condition: service_healthy }

  # --- AUTH & REST ---
  auth:
    image: supabase/gotrue:v2.186.0
    container_name: supabase-auth
    env_file: stack.env
    networks:
      - backend
    depends_on:
      db: { condition: service_healthy }

  rest:
    image: postgrest/postgrest:v14.5
    container_name: supabase-rest
    env_file: stack.env
    networks:
      - backend
    depends_on:
      db: { condition: service_healthy }

  # --- STORAGE ---
  storage:
    image: supabase/storage-api:v1.44.9
    container_name: supabase-storage
    env_file: stack.env
    networks:
      - backend
    volumes:
      - supabase-storage-data:/var/lib/storage
    depends_on:
      db: { condition: service_healthy }

  # --- STUDIO (Dashboard) ---
  studio:
    image: supabase/studio:2026.02.16-sha-26c615c
    container_name: supabase-studio
    env_file: stack.env
    networks:
      - frontend
      - backend
    ports:
      - "3000:3000"
    volumes:
      - supabase-studio-snippets:/app/snippets
      - supabase-studio-functions:/app/edge-functions
