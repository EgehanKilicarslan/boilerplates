networks:
  frontend:
    external: true # <-- (Optional) Change this to false if you want to create a new network
  backend:
    external: true # <-- (Optional) Change this to false if you want to create a new network

volumes:
  open-webui-data:
    external: true # <-- (Optional) Change this to false if you want to create a new volume

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.6
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080" # <-- Map Open WebUI port for local access (optional)
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - open-webui-data:/app/backend/data
    env_file:
      - stack.env
    networks:
      - frontend
      - backend
